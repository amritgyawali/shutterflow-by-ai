spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shutterflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: shutterflow_admin
    password: shutterflow_admin_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-cache
      url: /api/v1/auth/.*
      rate-limits:
        - bandwidths:
            - capacity: 5
              time: 1
              unit: minutes

aws:
  s3:
    bucket-name: shutterflow-photos-dev
    endpoint: http://localhost:4566
    region: us-east-1
    access-key: mock-key
    secret-key: mock-secret

sendgrid:
  api-key: SG.mock_sendgrid_api_key_for_local_testing_purposes_only
  from-email: no-reply@shutterflow.com
