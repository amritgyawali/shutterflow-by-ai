spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-cache
      url: /api/v1/auth/.*
      rate-limits:
        - bandwidths:
            - capacity: 10
              time: 1
              unit: minutes

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET}
    endpoint: ${AWS_S3_ENDPOINT:}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL:no-reply@shutterflow.com}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://app.shutterflow.com}
