spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:shutterflow_db}?useSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME:shutterflow_admin}
    password: ${DB_PASSWORD:shutterflow_admin_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-cache
      url: /api/v1/auth/.*
      rate-limits:
        - bandwidths:
            - capacity: 10
              time: 1
              unit: minutes

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:shutterflow-photos-staging}
    endpoint: ${AWS_S3_ENDPOINT:}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:no-reply@shutterflow.com}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://staging.shutterflow.com}
