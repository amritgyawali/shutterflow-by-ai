name: ShutterFlow Continuous Integration

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-build:
    name: Backend Build & Compile Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle Packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant Execute Permission to Gradlew
      run: chmod +x backend/gradlew

    - name: Compile Backend
      run: |
        cd backend
        ./gradlew compileJava --no-daemon

  backend-test:
    name: Backend Test Suite (Spring Boot)
    runs-on: ubuntu-latest
    needs: backend-build
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle Packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant Execute Permission to Gradlew
      run: chmod +x backend/gradlew

    - name: Run Spring Boot Tests
      run: |
        cd backend
        ./gradlew test --no-daemon
      env:
        SPRING_PROFILES_ACTIVE: test

    - name: Upload Test Reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: backend/build/reports/tests/

  frontend-build:
    name: Frontend Build Check (Angular)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Frontend
      run: |
        cd frontend
        npx ng build
